apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: nginx-test
  annotations:
    cert-manager.io/cluster-issuer: k3s-local-ca-issuer
spec:
  ingressClassName: ningx
  tls:
    - hosts:
        - nginx.k3s.local
      secretName: nginx-tls
  rules:
    - host: nginx.k3s.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: nginx
                port:
                  number: 80
