apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: selfsigned-issuer
spec:
  selfSigned: {}
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: k3s-local-ca
  namespace: cert-manager
spec:
  isCA: true
  commonName: k3s-local-ca  
  secretName: k3s-local-ca-secret
  privateKey:
    algorithm: ECDSA
    size: 256
  issuerRef:
    name: selfsigned-issuer
    kind: ClusterIssuer
---
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: k3s-local-ca-issuer
spec:
  ca:
    secretName: k3s-local-ca-secret
